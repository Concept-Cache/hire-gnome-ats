name: Bug report
description: Report a reproducible bug.
title: "[Bug]: "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: Clear description of the bug.
      placeholder: What happened?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Include exact steps, data, and route.
      placeholder: |
        1. Go to...
        2. Click...
        3. Observe...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: What should have happened?
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs / errors
      description: Include relevant console, API, or server logs.
      render: shell
  - type: input
    id: environment
    attributes:
      label: Environment
      description: OS, Node version, browser, DB mode (local/docker).
      placeholder: "macOS 14, Node 20.12, Chrome 124, Docker MySQL"
