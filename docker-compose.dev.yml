services:
  mysql:
    image: mysql:8.4
    container_name: hire-gnome-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: ats
      MYSQL_USER: ats
      MYSQL_PASSWORD: ats
    ports:
      - "3307:3306"
    volumes:
      - hire_gnome_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  hire_gnome_mysql_data:
